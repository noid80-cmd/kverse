<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow at top -->
  <rect width="512" height="280" rx="112" ry="112" fill="url(#glow)" opacity="0.5"/>

  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>

  <!-- K letterform -->
  <text
    x="256" y="352"
    font-family="'Plus Jakarta Sans', 'Arial Black', sans-serif"
    font-size="300"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-8"
    opacity="1"
  >K</text>
</svg>
